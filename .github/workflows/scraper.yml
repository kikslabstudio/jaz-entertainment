name: Scraper Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install python-telegram-bot
      - name: Run scraper
        run: python scraper.py
      - name: Generate category pages
        run: python gen_pages.py
      - name: Post new movies to Telegram
        run: python telegram_bot.py 5
      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add movies.js category sitemap.xml
          git diff --cached --quiet || git commit -m "chore: update movies [skip ci]"
          git push
