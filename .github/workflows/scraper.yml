name: Scraper Hourly

on:
  schedule:
    - cron: "0 * * * *"   # every hour (UTC)
  workflow_dispatch:       # manual run button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run scraper
        run: python scraper.py
      - name: Generate category pages (SEO)
        run: python gen_pages.py
      - name: Post new movies to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: pip install python-telegram-bot && python telegram_bot.py 5
      - name: Commit movies.js + category pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add movies.js category sitemap.xml
          git diff --cached --quiet || git commit -m "chore: update movies + category pages [skip ci]"
          git push
